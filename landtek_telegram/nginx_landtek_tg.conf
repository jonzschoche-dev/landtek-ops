# LandTek Telegram bulletproof receiver — paste into the leo.hayuma.org
# server block (or include via /etc/nginx/snippets/).
#
# Routes Telegram webhook → Python receiver on 127.0.0.1:8766.
# Leaves n8n's /webhook/* path alone so the rest of the workflow still works.

location = /landtek/tg {
    proxy_pass         http://127.0.0.1:8766/landtek/tg;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    client_max_body_size 25m;
}

location = /landtek/tg/healthz {
    proxy_pass         http://127.0.0.1:8766/healthz;
    proxy_http_version 1.1;
    access_log         off;
}
